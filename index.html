<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KJ Donation Portal</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(#0b2c5a,#071a33);
color:white;
}


/* HEADER */

header{
background:#061a33;
padding:15px;
text-align:center;
font-weight:bold;
border-bottom:3px solid gold;
}


/* INFO */

.info{
max-width:380px;
margin:10px auto;
font-size:13px;
opacity:.9;
text-align:center;
}


/* CARD */

.card{
max-width:380px;
margin:15px auto;
padding:20px;
background:white;
color:black;
border-radius:14px;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}


input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
}


button{
width:100%;
padding:12px;
border:0;
border-radius:8px;
font-weight:bold;
margin-top:8px;
cursor:pointer;
}


.gen{
background:gold;
}

.copy{
background:#0b2c5a;
color:white;
}


/* spinner */

.loader{
display:none;
margin:auto;
border:4px solid #eee;
border-top:4px solid gold;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}


/* progress */

.progress{
height:6px;
background:#ddd;
border-radius:5px;
overflow:hidden;
display:none;
}

.bar{
height:100%;
width:0%;
background:gold;
}


img{
width:200px;
margin-top:10px;
}


</style>

</head>

<body>


<header>

KRISTU JAYANTI BACK FEE DONATION PORTAL

</header>


<div class="info">

Generate donation link using QR or UPI<br>
Share link with friends for support<br>
Use small image for best result

</div>



<div class="card" id="formBox">

<h3>Create Donation Link</h3>

<input id="name" placeholder="Name">

<input id="roll" placeholder="Roll">

<input id="sub" placeholder="Subject">

<input id="upi" placeholder="UPI (optional)">

Upload QR
<input type="file" id="qrFile">


<div class="progress">
<div class="bar" id="bar"></div>
</div>


<div class="loader" id="loader"></div>


<button class="gen" onclick="makeLink()">

Generate Link

</button>

<button class="copy" onclick="copyLink()">

Copy Link

</button>


<div id="linkBox"></div>

</div>



<div class="card" id="donateBox" style="display:none">

<h2 id="dname"></h2>

<div id="droll"></div>
<div id="dsub"></div>
<div id="dupi"></div>

<img id="qr">

</div>



<script>

let qrData=""
let finalLink=""

let progress=document.querySelector(".progress")
let bar=document.getElementById("bar")
let loader=document.getElementById("loader")



// resize image

function compressImage(file,callback){

progress.style.display="block"

let reader=new FileReader()

reader.onload=function(e){

let img=new Image()

img.onload=function(){

let canvas=document.createElement("canvas")

let size=200

canvas.width=size
canvas.height=size

let ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0,size,size)

qrData=canvas.toDataURL("image/jpeg",0.5)

progress.style.display="none"

callback()

}

img.src=e.target.result

}

reader.readAsDataURL(file)

}



// upload

document.getElementById("qrFile").onchange=function(e){

let file=e.target.files[0]

bar.style.width="30%"

compressImage(file,function(){

bar.style.width="100%"

})

}



// generate

function makeLink(){

loader.style.display="block"

let name=document.getElementById("name").value
let roll=document.getElementById("roll").value
let sub=document.getElementById("sub").value
let upi=document.getElementById("upi").value


if(!qrData && upi){

qrData=
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa="+upi

}


setTimeout(function(){

finalLink=

location.origin+
location.pathname+
"?name="+encodeURIComponent(name)+
"&roll="+encodeURIComponent(roll)+
"&sub="+encodeURIComponent(sub)+
"&upi="+encodeURIComponent(upi)+
"&qr="+encodeURIComponent(qrData)


document.getElementById("linkBox").innerText=finalLink

loader.style.display="none"

},500)

}



// copy

function copyLink(){

navigator.clipboard.writeText(finalLink)

alert("Copied")

}



// params

function get(n){

return new URLSearchParams(location.search).get(n)

}


let name=get("name")

if(name){

document.getElementById("formBox").style.display="none"
document.getElementById("donateBox").style.display="block"

document.getElementById("dname").innerText=name
document.getElementById("droll").innerText="Roll: "+get("roll")
document.getElementById("dsub").innerText="Subject: "+get("sub")
document.getElementById("dupi").innerText="UPI: "+get("upi")

document.getElementById("qr").src=get("qr")

}

</script>

</body>
</html>
