<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KJ Donation Portal</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(180deg,#0b2c5a,#071a33);
color:white;
}


/* HEADER */

header{
background:#061a33;
padding:16px;
text-align:center;
font-weight:bold;
font-size:18px;
border-bottom:3px solid gold;
letter-spacing:1px;
}


/* CARD */

.card{

max-width:380px;
margin:20px auto;
padding:20px;

background:rgba(255,255,255,0.95);

color:black;

border-radius:14px;

box-shadow:0 6px 20px rgba(0,0,0,0.5);

}


/* INPUT */

input{

width:100%;
padding:10px;
margin:6px 0;

border-radius:8px;
border:1px solid #ccc;

font-size:14px;

}


/* BUTTON */

button{

width:100%;
padding:12px;

border-radius:8px;
border:0;

font-weight:bold;

margin-top:8px;

cursor:pointer;

}


.genBtn{
background:gold;
}

.copyBtn{
background:#0b2c5a;
color:white;
}


/* DONATION */

img{
width:220px;
margin-top:10px;
border-radius:10px;
}


/* FOOTER */

footer{
text-align:center;
font-size:12px;
padding:10px;
opacity:0.7;
}

</style>

</head>

<body>

<header>

KRISTU JAYANTI BACK FEE DONATION PORTAL

</header>



<div class="card" id="formBox">

<h3>Create Donation Link</h3>

<input id="name" placeholder="Name">

<input id="roll" placeholder="Roll">

<input id="sub" placeholder="Subject">

<input id="upi" placeholder="UPI ID (optional)">

<label>Upload QR (optional)</label>

<input type="file" id="qrFile">


<button class="genBtn" onclick="makeLink()">

Generate Link

</button>

<button class="copyBtn" onclick="copyLink()">

Copy Link

</button>


<div id="linkBox"></div>

</div>




<div class="card" id="donateBox" style="display:none">

<h2 id="dname"></h2>

<div id="droll"></div>
<div id="dsub"></div>

<div id="dupi"></div>

<img id="qr">

</div>



<footer>

Kristu Jayanti Student Support Portal

</footer>



<script>

let qrData=""
let finalLink=""


document.getElementById("qrFile").onchange=function(e){

let f=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

qrData=reader.result

}

reader.readAsDataURL(f)

}



function makeLink(){

let name=document.getElementById("name").value
let roll=document.getElementById("roll").value
let sub=document.getElementById("sub").value
let upi=document.getElementById("upi").value


if(!qrData && upi){

qrData=
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa="+upi

}


finalLink=
location.origin+
location.pathname+
"?name="+encodeURIComponent(name)+
"&roll="+encodeURIComponent(roll)+
"&sub="+encodeURIComponent(sub)+
"&upi="+encodeURIComponent(upi)+
"&qr="+encodeURIComponent(qrData)


document.getElementById("linkBox").innerText=finalLink

}



function copyLink(){

navigator.clipboard.writeText(finalLink)

alert("Link copied")

}



function get(n){

return new URLSearchParams(location.search).get(n)

}


let name=get("name")

if(name){

document.getElementById("formBox").style.display="none"
document.getElementById("donateBox").style.display="block"

document.getElementById("dname").innerText=name
document.getElementById("droll").innerText="Roll: "+get("roll")
document.getElementById("dsub").innerText="Subject: "+get("sub")
document.getElementById("dupi").innerText="UPI: "+get("upi")

document.getElementById("qr").src=get("qr")

}

</script>


</body>
</html>
